services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evalpilot
      POSTGRES_PASSWORD: evalpilot
      POSTGRES_DB: evalpilot
    ports:
      - "5432:5432"
    volumes:
      - evalpilot_pgdata:/var/lib/postgresql/data

volumes:
  evalpilot_pgdata:
